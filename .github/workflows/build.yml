name: Build ZahraSpace APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout kode
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      # 2. Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. HAPUS WRAPPER LAMA DAN SETEL ULANG KE VERSI 8.11.1
      - name: Setup Gradle 8.11.1
        run: |
          rm -rf gradle/ gradlew gradlew.bat
          wget -q https://services.gradle.org/distributions/gradle-8.11.1-bin.zip
          unzip -q gradle-8.11.1-bin.zip
          export GRADLE_HOME="`pwd`/gradle-8.11.1"
          echo "GRADLE_HOME=$GRADLE_HOME" >> $GITHUB_ENV
          echo "$GRADLE_HOME/bin" >> $GITHUB_PATH

      # 5. Cache Gradle (opsional, gunakan versi 8.11.1)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-8.11.1-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-8.11.1-

      # 6. Beri izin eksekusi (untuk jaga-jaga)
      - name: Grant execute permission
        run: chmod +x gradlew || true

      # 7. Build APK (gunakan gradle langsung, bukan wrapper)
      - name: Build Debug APK
        run: gradle clean assembleDebug --no-daemon

      # 8. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZahraSpace-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
