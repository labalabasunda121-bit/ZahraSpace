name: Build Zahra Space APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11

      - name: Create gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            echo "📦 Creating gradle wrapper..."
            gradle wrapper
            chmod +x gradlew
          fi

      # ================================================
      # MODIFIKASI MODEL 3D
      # ================================================
      - name: Transform Zahra character
        run: |
          echo "🎨 MODIFIKASI: Ubah jadi Zahra (hijab hitam, mata besar, pipi merah)..."
          cd app/src/main/assets/models
          
          # Hijab hitam
          sed -i 's/"baseColorFactor": \[.*\]/"baseColorFactor": [0.0, 0.0, 0.0, 1.0]/g' zahra.gltf
          
          # Kulit caramel
          sed -i 's/"baseColorFactor": \[0.8, 0.8, 0.8, 1.0\]/"baseColorFactor": [0.89, 0.67, 0.55, 1.0]/g' zahra.gltf
          
          # Pipi merah
          sed -i 's/"name": "Skin"/"name": "Skin", "emissiveFactor": [0.1, 0.0, 0.0]/g' zahra.gltf
          
          # Mata besar
          sed -i 's/"scale": \[1.0, 1.0, 1.0\]/"scale": [1.8, 1.8, 1.0]/g' zahra.gltf
          
          echo "✅ Zahra ready"

      - name: Transform City
        run: |
          echo "🏙️ MODIFIKASI: Tambah masjid..."
          cd app/src/main/assets/models
          
          # Ganti nama jadi masjid
          sed -i 's/Sponza/Masjid Nurul Huda/g' city.gltf
          
          # Kubah hijau
          sed -i 's/"baseColorFactor": \[0.5, 0.5, 0.5, 1.0\]/"baseColorFactor": [0.18, 0.49, 0.20, 1.0]/g' city.gltf
          
          echo "✅ City ready"

      # ================================================
      # BUILD APK
      # ================================================
      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZahraSpace-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
